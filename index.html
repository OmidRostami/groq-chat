<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI Chat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    :root {
      --accent: #f97316;
      --accent-dark: #ea6c0a;
      --accent-dim: #7c3a0a;
      --accent-bg: #231206;
      --accent-border: #9a3412;
      --accent-text: #fed7aa;
      /* Tint vars precomputed for Safari (no color-mix) */
      --at-8w:  rgb(254,244,234);
      --at-10w: rgb(254,240,229);
      --at-14w: rgb(254,232,218);
      --at-15w: rgb(253,230,215);
      --at-30w: rgb(252,205,179);
      --at-40w: rgb(251,188,155);
      --at-10t: rgba(249,115,22,0.10);
      --at-12t: rgba(249,115,22,0.12);
      --at-15t: rgba(249,115,22,0.15);
      --at-40t: rgba(249,115,22,0.40);
    }

    /* Light mode */
    body.light {
      --bg: #f5f5f5;
      --bg2: #ffffff;
      --bg3: #ececec;
      --border: #ddd;
      --text: #111;
      --text2: #444;
      --text3: #888;
    }
    body.light { background: var(--bg) !important; color: var(--text) !important; }
    body.light #sidebar { background: var(--bg2) !important; border-color: var(--border) !important; }
    body.light .top-bar { background: var(--bg2) !important; border-color: var(--border) !important; }
    body.light .messages { background: var(--bg) !important; }
    body.light .input-bar { background: transparent !important; border-top: none !important; }
    body.light .msg.assistant .bubble { background: var(--bg2) !important; border-color: var(--border) !important; color: var(--text) !important; }
    body.light .chat-item:hover { background: var(--at-8w) !important; }
    body.light .chat-item.active { background: var(--at-12t) !important; }
    body.light .input-row { background: #ffffff !important; border-color: #ddd !important; box-shadow: 0 4px 24px rgba(0,0,0,0.12) !important; }
    body.light textarea { color: var(--text) !important; }
    body.light .popup-menu { background: var(--bg2) !important; border-color: var(--border) !important; }
    body.light .popup-header { color: var(--text3) !important; }
    body.light .sidebar-bottom { border-color: var(--border) !important; }
    body.light .user-name { color: var(--text2) !important; }
    body.light .section-label { color: #bbb !important; }
    body.light .chat-item-name { color: var(--text2) !important; }
    body.light #chat-title { color: var(--text3) !important; }
    body.light .bubble p, body.light .bubble li { color: var(--text) !important; }
    body.light .bubble { color: var(--text) !important; }
    body.light .bubble strong { color: #111 !important; font-weight: 700 !important; }
    body.light .bubble h1, body.light .bubble h2, body.light .bubble h3 { color: #111 !important; }
    body.light .bubble code { background: #ebebeb !important; color: var(--accent) !important; }
    body.light .bubble pre { background: #efefef !important; border-color: #ddd !important; }
    body.light .bubble pre * { background: transparent !important; }
    body.light .bubble pre code { color: #1a1a1a !important; background: transparent !important; }
    body.light .code-block { background: #efefef !important; border-color: #ddd !important; }
    body.light .theme-opt { background: #f0f0f0 !important; border-color: var(--border) !important; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      display: flex;
      height: var(--vh, 100vh);
    }

    /* ════════════════════════════════════════
       HORIZONTAL sidebar (desktop / landscape)
       body has class "layout-h"
       ════════════════════════════════════════ */
    body.layout-h {
      flex-direction: row;
      height: var(--vh, 100vh);
      overflow: hidden;
    }


    body.layout-h #sidebar {
      width: 248px;
      min-width: 248px;
      height: var(--vh, 100vh);
      flex-shrink: 0;
      background: #111;
      border-right: 1px solid #1e1e1e;
      border-bottom: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.22s cubic-bezier(.4,0,.2,1), min-width 0.22s cubic-bezier(.4,0,.2,1);
    }

    body.layout-h #sidebar.sidebar-closed {
      width: 0;
      min-width: 0;
      border-right: none;
    }

    body.layout-h .sidebar-bottom { display: flex; flex-direction: column; }

    /* All icons hidden by default */
    .icon-h-open, .icon-h-closed, .icon-v-open, .icon-v-closed { display: none; }

    /* Horizontal layout icons — driven by body.sidebar-is-open */
    body.layout-h.sidebar-is-open  .icon-h-open   { display: block; }
    body.layout-h.sidebar-is-open  .icon-h-closed { display: none;  }
    body.layout-h:not(.sidebar-is-open) .icon-h-open   { display: none;  }
    body.layout-h:not(.sidebar-is-open) .icon-h-closed { display: block; }

    /* ════════════════════════════════════════
       VERTICAL sidebar (mobile / portrait)
       body has class "layout-v"
       ════════════════════════════════════════ */
    body.layout-v {
      flex-direction: column;
      height: var(--vh, 100vh);
      overflow: hidden;
    }

    body.layout-v #sidebar {
      width: 100%;
      min-width: 0;
      height: 0;
      max-height: 0;
      flex-shrink: 0;
      background: #111;
      border-right: none;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: max-height 0.25s cubic-bezier(.4,0,.2,1);
    }

    body.layout-v #sidebar.sidebar-open {
      height: auto;
      max-height: calc(var(--vh, 100vh) * 0.52);
      overflow-y: auto;
    }

    /* Vertical layout icons — driven by body.sidebar-is-open */
    body.layout-v.sidebar-is-open  .icon-v-open   { display: block; }
    body.layout-v.sidebar-is-open  .icon-v-closed { display: none;  }
    body.layout-v:not(.sidebar-is-open) .icon-v-open   { display: none;  }
    body.layout-v:not(.sidebar-is-open) .icon-v-closed { display: block; }

    /* Bottom info row: show inline in vertical layout inside drawer */
    body.layout-v .sidebar-bottom {
      display: flex;
      flex-direction: column;
      padding: 0.5rem 0.65rem;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    body.layout-v .bottom-row { width: 100%; }
    body.layout-v .user-name { display: block; }


    /* Shared no-animation helper */
    #sidebar.no-transition { transition: none !important; }

    /* ── Main area shared ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Mobile content tweaks ── */
    @media (max-width: 640px) {
      .messages { padding: 0.75rem 0.5rem 0.25rem; }
      .msg { max-width: 100%; }
      .msg-body { max-width: calc(100% - 36px); }
      .bubble { font-size: 0.85rem; padding: 0.6rem 0.75rem; }
      .input-bar { padding: 0.4rem 0.5rem 0.6rem; }
      .input-wrap { padding-left: 0 !important; }
      .input-row { max-width: 100% !important; margin-left: 0 !important; border-radius: 12px; }
      textarea { min-height: 44px; font-size: 16px; }
      .code-block { font-size: 0.8rem; }
      .bubble pre code { font-size: 0.78rem; }
      .top-bar { padding: 0.45rem 0.75rem; }
    }

    .sidebar-top {
      padding: 0.65rem 0.65rem 0.5rem;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    .btn-new {
      width: 100%;
      padding: 0.55rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .btn-new:hover { background: var(--accent-dark); }

    .btn-import {
      width: 100%;
      padding: 0.5rem;
      background: none;
      color: #888;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 400;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }
    .btn-import:hover { color: var(--accent); border-color: var(--accent-dim); }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0.4rem 0.5rem;
    }

    .section-label {
      font-size: 0.67rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      padding: 0.7rem 0.4rem 0.25rem;
      white-space: nowrap;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 0.48rem 0.5rem;
      border-radius: 7px;
      cursor: pointer;
      position: relative;
    }
    .chat-item:hover { background: rgba(255,255,255,0.04); }
    .chat-item.active { background: var(--accent-bg); }

    .chat-pin-icon {
      display: flex;
      align-items: center;
      color: var(--accent);
      margin-right: 0.35rem;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .chat-item-name {
      flex: 1;
      font-size: 0.82rem;
      color: #bbb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .chat-item.active .chat-item-name { color: var(--accent); }

    .chat-item-actions {
      display: flex;
      gap: 0.15rem;
      flex-shrink: 0;
      opacity: 0;
      pointer-events: none;
    }
    .chat-item:hover .chat-item-actions { opacity: 1; pointer-events: auto; }

    .icon-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.18rem 0.26rem;
      border-radius: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover { color: var(--accent); background: var(--at-10t); }
    body.light .icon-btn:hover { background: var(--at-10w); }
    .icon-btn.del:hover { color: #f87171; background: #1f0e0e; }
    .icon-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .icon-btn.del svg { width: 13px; height: 13px; }

    /* Sidebar bottom */
    .sidebar-bottom {
      border-top: 1px solid #1a1a1a;
      padding: 0.55rem 0.65rem;
      flex-shrink: 0;
      position: relative;
    }

    .bottom-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .user-avatar:hover { opacity: 0.85; }

    .user-name {
      font-size: 0.83rem;
      color: #ccc;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .bottom-icon-btn {
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      flex-shrink: 0;
      padding: 0;
    }
    .bottom-icon-btn svg { width: 16px; height: 16px; }
    .bottom-icon-btn:hover { color: var(--accent); background: var(--at-10t); }
    body.light .bottom-icon-btn:hover { background: var(--at-10w); }

    /* ── Popup menus ── */
    .popup-menu {
      position: fixed;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 0.4rem;
      display: none;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 9999;
      min-width: 200px;
    }
    .popup-menu.open { display: flex; }
    body.light .popup-menu { background: #fff !important; border-color: #e0e0e0 !important; }

    .popup-header {
      font-size: 0.78rem;
      color: #888;
      padding: 0.35rem 0.5rem;
      font-weight: 500;
    }

    .popup-divider {
      height: 1px;
      background: #242424;
      margin: 0.3rem 0;
    }

    .popup-section-label {
      font-size: 0.7rem;
      color: #555;
      padding: 0.2rem 0.5rem 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .popup-item {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.5rem 0.6rem;
      border-radius: 7px;
      border: 1px solid transparent;
      background: none;
      color: #ccc;
      font-size: 0.83rem;
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: all 0.15s;
    }
    .popup-item svg { width: 14px; height: 14px; flex-shrink: 0; }
    /* Dark hover: accent border + tint bg + full accent text */
    .popup-item:hover {
      border-color: var(--at-40t);
      background: var(--at-12t);
      color: var(--accent);
    }
    /* Light base */
    body.light .popup-item { color: #333 !important; }
    /* Light hover: same logic */
    body.light .popup-item:hover {
      border-color: var(--at-40w) !important;
      background: var(--at-10w) !important;
      color: var(--accent) !important;
    }
    /* Sign out danger */
    .popup-item.danger { color: #666; }
    .popup-item.danger:hover {
      border-color: rgba(248,113,113,0.4);
      background: rgba(248,113,113,0.10);
      color: #f87171;
    }
    body.light .popup-item.danger { color: #888 !important; }
    body.light .popup-item.danger:hover {
      border-color: rgba(220,38,38,0.3) !important;
      background: rgba(220,38,38,0.08) !important;
      color: #dc2626 !important;
    }

    /* Theme options */
    .theme-options {
      display: flex;
      gap: 0.3rem;
      padding: 0.2rem 0.4rem 0.4rem;
    }

    .theme-opt {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      padding: 0.45rem 0.3rem;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      background: #111;
      color: #666;
      font-size: 0.68rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .theme-opt svg { width: 14px; height: 14px; }
    /* Dark mode hover: accent border + accent text tint + bg tint */
    .theme-opt:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--at-10t);
    }
    .theme-opt.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--at-15t);
    }
    /* Light mode base */
    body.light .theme-opt {
      background: #f5f5f5 !important;
      border-color: #ddd !important;
      color: #777 !important;
    }
    /* Light mode hover: same logic — accent border + accent text + tint bg */
    body.light .theme-opt:hover {
      border-color: var(--accent) !important;
      color: var(--accent) !important;
      background: var(--at-10w) !important;
    }
    body.light .theme-opt.active {
      border-color: var(--accent) !important;
      color: var(--accent) !important;
      background: var(--at-14w) !important;
    }

    /* Color swatches */
    .color-options {
      display: flex;
      gap: 0.45rem;
      padding: 0.2rem 0.5rem 0.4rem;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #fff; transform: scale(1.1); }
    body.light .color-swatch.active { border-color: #333; }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
      height: 100%;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 1rem;
      border-bottom: 1px solid #1a1a1a;
      background: #111;
      flex-shrink: 0;
    }

    .btn-toggle {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-toggle:hover { color: var(--accent); background: var(--at-10t); }
    body.light .btn-toggle:hover { background: var(--at-10w); }
    .btn-toggle svg { width: 18px; height: 18px; }

    #chat-title {
      flex: 1;
      font-size: 0.87rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    /* ── Setup ── */
    #setup {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .setup-card {
      background: #161616;
      border: 1px solid #242424;
      border-radius: 16px;
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .setup-card h1 { font-size: 1.35rem; font-weight: 600; margin-bottom: 0.3rem; color: #f0f0f0; }
    .setup-card > p { font-size: 0.83rem; color: #777; margin-bottom: 1.75rem; line-height: 1.5; }
    .setup-card a { color: #f97316; text-decoration: none; }

    .field-group { margin-bottom: 1.1rem; }
    .field-group label { display: block; font-size: 0.78rem; color: #888; margin-bottom: 0.35rem; }

    .field-group input {
      width: 100%;
      padding: 0.62rem 0.85rem;
      background: #0d0d0d;
      border: 1px solid #242424;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .field-group input:focus { border-color: #f97316; }

    .btn-primary {
      width: 100%;
      padding: 0.68rem;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.4rem;
    }
    .btn-primary:hover { background: #ea6c0a; }
    .error-msg { font-size: 0.8rem; color: #f87171; margin-top: 0.7rem; display: none; }

    /* ── Chat view ── */
    #chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: #0f0f0f;
    }

    .msg {
      display: flex;
      gap: 0.6rem;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      font-weight: 700;
      margin-top: 2px;
    }
    .msg.user .avatar { background: var(--accent); color: #fff; }
    .msg.assistant .avatar { background: #1c1c1c; color: #aaa; border: 1px solid #2a2a2a; }
    body.light .msg.assistant .avatar { background: #e0e0e0 !important; color: #555 !important; border-color: #ccc !important; }
    body.light .msg.user .bubble { background: var(--at-15w) !important; border-color: var(--at-30w) !important; color: #1a1a1a !important; }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 0.28rem;
      min-width: 0;
      max-width: calc(100% - 38px);
    }
    .msg.user .msg-body { align-items: flex-end; }

    .bubble {
      padding: 0.68rem 0.88rem;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.68;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      color: var(--accent-text);
      border-radius: 12px 4px 12px 12px;
      white-space: pre-wrap;
    }
    .msg.assistant .bubble {
      background: #161616;
      border: 1px solid #242424;
      color: #ddd;
      border-radius: 4px 12px 12px 12px;
    }

    .msg-actions { display: flex; gap: 0.3rem; margin-top: 0.4rem; }

    .msg-action-btn {
      font-size: 0.68rem;
      color: #555;
      background: none;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 0.18rem 0.45rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .msg-action-btn svg { width: 11px; height: 11px; flex-shrink: 0; }
    .msg-action-btn:hover { color: var(--accent); border-color: var(--accent); }

<script>
  // Pre-paint: set layout + sidebar + accent color before first render — no flash
  (function() {
    var isH = window.innerWidth > window.innerHeight && window.innerWidth > 640;
    document.body.classList.add(isH ? "layout-h" : "layout-v");
    var open = localStorage.getItem("sidebar_open") !== "0";
    document.body.classList.toggle("sidebar-is-open", open);
    var sidebar = document.getElementById("sidebar");
    if (sidebar) {
      sidebar.classList.add("no-transition");
      if (isH && !open) sidebar.classList.add("sidebar-closed");
      if (!isH && open) sidebar.classList.add("sidebar-open");
    }
    // Apply saved accent color immediately so no orange flash
    var COLORS = {
      orange: { accent:'#f97316', dark:'#ea6c0a', dim:'#7c3a0a', bg:'#231206', border:'#9a3412', text:'#fed7aa' },
      green:  { accent:'#22c55e', dark:'#16a34a', dim:'#14532d', bg:'#0d2a12', border:'#166534', text:'#bbf7d0' },
      blue:   { accent:'#3b82f6', dark:'#2563eb', dim:'#1e3a8a', bg:'#0d1a35', border:'#1e40af', text:'#bfdbfe' },
      purple: { accent:'#a855f7', dark:'#9333ea', dim:'#581c87', bg:'#1e0a35', border:'#6b21a8', text:'#e9d5ff' },
      gray:   { accent:'#6b7280', dark:'#4b5563', dim:'#374151', bg:'#18191b', border:'#4b5563', text:'#e5e7eb' },
    };
    var name = localStorage.getItem("accent_color") || "orange";
    var c = COLORS[name] || COLORS.orange;
    var r = document.documentElement.style;
    r.setProperty("--accent",        c.accent);
    r.setProperty("--accent-dark",   c.dark);
    r.setProperty("--accent-dim",    c.dim);
    r.setProperty("--accent-bg",     c.bg);
    r.setProperty("--accent-border", c.border);
    r.setProperty("--accent-text",   c.text);
  })();

  // Set --vh = real viewport height. Most reliable fix for iOS Safari address bar issues.
  function setVH() {
    document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
  }
  setVH();
  window.addEventListener('resize', setVH);
  window.addEventListener('orientationchange', function() { setTimeout(setVH, 150); });
</script>

<script>
  const KEY_STORE   = "groq_api_key";
  const NAME_STORE  = "groq_user_name";
  const CHATS_STORE = "groq_chats";
  const MODEL = "llama-3.3-70b-versatile";

  let apiKey = "";
  let userName = "";
  let chats = {};
  let activeChatId = null;
  let sidebarOpen = true;
  let pendingDeleteId = null;

  marked.setOptions({ breaks: true, gfm: true });

  // Override link renderer to open in new tab
  const renderer = new marked.Renderer();
  renderer.link = function(href, title, text) {
    const t = title ? ` title="${title}"` : '';
    return `<a href="${href}"${t} target="_blank" rel="noopener noreferrer">${text}</a>`;
  };
  marked.setOptions({ renderer });

  /* ── Init ── */
  function init() {
    apiKey   = localStorage.getItem(KEY_STORE) || "";
    userName = localStorage.getItem(NAME_STORE) || "";
    chats    = JSON.parse(localStorage.getItem(CHATS_STORE) || "{}");
    // Restore sidebar state (var + icons must match the CSS class already applied)
    const savedSidebar = localStorage.getItem("sidebar_open");
    sidebarOpen = savedSidebar !== "0";
    applyLayout(); // sets layout class + sidebar state without animation
    if (apiKey && userName) showApp();
    initAppearance();
  }

  // "horizontal" = side panel (desktop/landscape), "vertical" = top drawer (portrait/mobile)
  function getLayout() {
    return window.innerWidth > window.innerHeight && window.innerWidth > 640
      ? "horizontal" : "vertical";
  }

  function applyLayout() {
    const layout = getLayout();
    document.body.classList.toggle("layout-h", layout === "horizontal");
    document.body.classList.toggle("layout-v", layout === "vertical");
    applySidebarState(false);
  }

  function applySidebarState(animate) {
    const sidebar = document.getElementById("sidebar");
    if (!sidebar) return;
    if (!animate) sidebar.classList.add("no-transition");

    const layout = getLayout();

    // Clean up both classes first
    sidebar.classList.remove("sidebar-open", "sidebar-closed");
    document.body.classList.toggle("sidebar-is-open", sidebarOpen);

    if (layout === "horizontal") {
      if (!sidebarOpen) sidebar.classList.add("sidebar-closed");
    } else {
      if (sidebarOpen) sidebar.classList.add("sidebar-open");
    }

    if (!animate) {

        sidebar.classList.remove("no-transition")
      ));

  // Re-apply layout on orientation change
  window.addEventListener("resize", () => applyLayout());

  function saveChats() { localStorage.setItem(CHATS_STORE, JSON.stringify(chats)); }

  /* ── Setup ── */
  function saveSettings() {
    const name = document.getElementById("inputName").value.trim();
    const key  = document.getElementById("apiKey").value.trim();
    const err  = document.getElementById("setupError");
    if (!name) { err.textContent = "Please enter your name"; err.style.display = "block"; return; }
    if (key.length < 10) { err.textContent = "Please enter a valid API key"; err.style.display = "block"; return; }
    localStorage.setItem(NAME_STORE, name);
    localStorage.setItem(KEY_STORE, key);
    apiKey = key; userName = name;
    err.style.display = "none";
    showApp();
  }

  function signOut() {
    localStorage.removeItem(KEY_STORE);
    localStorage.removeItem(NAME_STORE);
    localStorage.removeItem(CHATS_STORE);
    apiKey = ""; userName = ""; chats = {}; activeChatId = null;
    document.getElementById("setup").style.display = "flex";
    document.getElementById("chat-view").style.display = "none";
    document.getElementById("chat-list").innerHTML = "";
    document.getElementById("apiKey").value = "";
    document.getElementById("inputName").value = "";
  }

  function showApp() {
    document.getElementById("setup").style.display = "none";
    document.getElementById("chat-view").style.display = "flex";
    // Show user in sidebar
    const initials = userName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    document.getElementById("userAvatarSidebar").textContent = initials;
    document.getElementById("userNameSidebar").textContent = userName;
    document.getElementById("userMenuName").textContent = userName;
    // API key copy handled by copyKeyFromMenu()
    renderSidebar();
    const ids = Object.keys(chats);
    if (ids.length) loadChat(ids[ids.length-1]);
    else newChat();

  /* ── Sidebar toggle ── */
  function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    localStorage.setItem("sidebar_open", sidebarOpen ? "1" : "0");
    applySidebarState(true);
  }

  /* ── Chat CRUD ── */
  function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

  function newChat() {
    const id = genId();
    chats[id] = { id, name:"New chat", pinned:false, messages:[] };
    saveChats();
    activeChatId = id;
    renderSidebar();
    loadChat(id);
    if (window.innerWidth > 640) document.getElementById("userInput").focus();
  }

  function loadChat(id) {
    activeChatId = id;
    const chat = chats[id];
    document.getElementById("chat-title").textContent = chat.name;
    const msgs = document.getElementById("messages");
    msgs.innerHTML = "";
    chat.messages.forEach(m => renderMessage(m.role, m.content));
    msgs.scrollTop = msgs.scrollHeight;
    renderSidebar();
    if (window.innerWidth > 640) document.getElementById("userInput").focus();
  }

  function togglePin(id) {
    chats[id].pinned = !chats[id].pinned;
    saveChats();
    renderSidebar();
  }

  /* ── Delete modal ── */
  function askDelete(id) {
    pendingDeleteId = id;
    document.getElementById("deleteModalDesc").textContent =
      `"${chats[id].name}" will be permanently deleted and cannot be recovered.`;
    document.getElementById("deleteModal").style.display = "flex";
  }

  function closeDeleteModal() {
    pendingDeleteId = null;
    document.getElementById("deleteModal").style.display = "none";
  }

  function confirmDelete() {
    const id = pendingDeleteId;
    closeDeleteModal();
    if (!id || !chats[id]) return;
    delete chats[id];
    saveChats();
    if (activeChatId === id) activeChatId = null;
    renderSidebar();
    const ids = Object.keys(chats);
    if (ids.length) loadChat(ids[ids.length-1]);
    else newChat();
  }

  document.getElementById("deleteModal").addEventListener("click", e => {
    if (e.target === document.getElementById("deleteModal")) closeDeleteModal();
  });

  function startRename(id, nameEl) {
    const chat = chats[id];
    const input = document.createElement("input");
    input.className = "rename-input";
    input.value = chat.name;
    nameEl.replaceWith(input);
    input.focus(); input.select();
    const finish = () => {
      const val = input.value.trim() || "New chat";
      chat.name = val; saveChats();
      if (activeChatId === id) document.getElementById("chat-title").textContent = val;
      renderSidebar();
    };
    input.addEventListener("blur", finish);
    input.addEventListener("keydown", e => {
      if (e.key==="Enter") { e.preventDefault(); input.blur(); }
      if (e.key==="Escape") { input.value=chat.name; input.blur(); }
    });
  }

  /* ── Messages ── */
  function addCopyButtons(el) {
    el.querySelectorAll("pre").forEach(pre => {
      const wrapper = document.createElement("div");
      wrapper.className = "code-block";

      const header = document.createElement("div");
      header.className = "code-block-header";

      const btn = document.createElement("button");
      btn.className = "copy-btn";
      btn.textContent = "Copy";
      btn.onclick = () => {
        navigator.clipboard.writeText(pre.querySelector("code")?.innerText || pre.innerText);
        btn.textContent = "Copied!";
        setTimeout(()=>btn.textContent="Copy", 1500);
      };

      header.appendChild(btn);
      wrapper.appendChild(header);
      pre.replaceWith(wrapper);
      wrapper.appendChild(pre);
    });
  }

  function toPlainText(md) {
    return md
      .replace(/```[\s\S]*?```/g, m=>m.replace(/```\w*\n?/g,"").trim())
      .replace(/`([^`]+)`/g,"$1")
      .replace(/\*\*(.+?)\*\*/g,"$1")
      .replace(/\*(.+?)\*/g,"$1")
      .replace(/^#{1,6}\s+/gm,"")
      .replace(/^>\s+/gm,"")
      .replace(/^\s*[-*+]\s+/gm,"• ")
      .replace(/\[(.+?)\]\(.+?\)/g,"$1")
      .trim();
  }

  function renderMessage(role, content, msgIndex) {
    const msgs = document.getElementById("messages");
    const msg = document.createElement("div");
    msg.className = `msg ${role}`;
    if (msgIndex !== undefined) msg.dataset.index = msgIndex;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    if (role === "user") {
      const initials = userName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
      avatar.textContent = initials || "U";
    } else {
      avatar.textContent = "AI";
    }

    const body = document.createElement("div");
    body.className = "msg-body";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (role === "assistant") {
      bubble.innerHTML = marked.parse(content);
      addCopyButtons(bubble);
    } else {
      bubble.textContent = content;
    }

    const actions = document.createElement("div");
    actions.className = "msg-actions";

    // Copy button
    const copyBtn = document.createElement("button");
    copyBtn.className = "msg-action-btn";
    copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
    copyBtn.onclick = () => {
      const plain = role==="assistant" ? toPlainText(content) : content;
      navigator.clipboard.writeText(plain);
      copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
      setTimeout(() => {
        copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
      }, 1500);
    };

    // Delete button
    const delBtn = document.createElement("button");
    delBtn.className = "msg-action-btn msg-action-del";
    delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg> Delete`;
    delBtn.onclick = () => deleteMessage(msg);

    actions.appendChild(copyBtn);
    actions.appendChild(delBtn);
    body.appendChild(bubble);
    body.appendChild(actions);
    msg.appendChild(avatar);
    msg.appendChild(body);
    msgs.appendChild(msg);
    return bubble;
  }

  function deleteMessage(msgEl) {
    if (!activeChatId) return;
    const chat = chats[activeChatId];
    // Find which message index this DOM element is
    const allMsgs = Array.from(document.getElementById("messages").children);
    const domIndex = allMsgs.indexOf(msgEl);
    if (domIndex === -1) return;
    // Remove from chat.messages array
    chat.messages.splice(domIndex, 1);
    saveChats();
    // Remove from DOM with fade
    msgEl.style.transition = "opacity 0.2s, transform 0.2s";
    msgEl.style.opacity = "0";
    msgEl.style.transform = "scale(0.97)";
    setTimeout(() => msgEl.remove(), 200);
  }

  /* ── Send ── */
  /* ── User & Settings menus ── */
  const ACCENT_COLORS = {
    orange: { accent:'#f97316', dark:'#ea6c0a', dim:'#7c3a0a', bg:'#231206', border:'#9a3412', text:'#fed7aa' },
    green:  { accent:'#22c55e', dark:'#16a34a', dim:'#14532d', bg:'#0d2a12', border:'#166534', text:'#bbf7d0' },
    blue:   { accent:'#3b82f6', dark:'#2563eb', dim:'#1e3a8a', bg:'#0d1a35', border:'#1e40af', text:'#bfdbfe' },
    purple: { accent:'#a855f7', dark:'#9333ea', dim:'#581c87', bg:'#1e0a35', border:'#6b21a8', text:'#e9d5ff' },
    gray:   { accent:'#6b7280', dark:'#4b5563', dim:'#374151', bg:'#18191b', border:'#4b5563', text:'#e5e7eb' },
  };

  let currentColor = localStorage.getItem("accent_color") || "orange";
  let currentTheme = localStorage.getItem("theme_mode") || "system";

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return [r,g,b];
  }

  function tint(hex, pct, onWhite) {
    const [r,g,b] = hexToRgb(hex);
    const a = pct / 100;
    if (onWhite) {
      // blend over white
      const rr = Math.round(r*a + 255*(1-a));
      const gg = Math.round(g*a + 255*(1-a));
      const bb = Math.round(b*a + 255*(1-a));
      return `rgb(${rr},${gg},${bb})`;
    } else {
      return `rgba(${r},${g},${b},${a})`;
    }
  }

  function applyAccentColor(name) {
    currentColor = name;
    localStorage.setItem("accent_color", name);
    const c = ACCENT_COLORS[name];
    const root = document.documentElement.style;
    root.setProperty("--accent",        c.accent);
    root.setProperty("--accent-dark",   c.dark);
    root.setProperty("--accent-dim",    c.dim);
    root.setProperty("--accent-bg",     c.bg);
    root.setProperty("--accent-border", c.border);
    root.setProperty("--accent-text",   c.text);
    // Precompute tint vars for Safari compatibility (no color-mix support)
    root.setProperty("--at-8w",  tint(c.accent,  8, true));
    root.setProperty("--at-10w", tint(c.accent, 10, true));
    root.setProperty("--at-14w", tint(c.accent, 14, true));
    root.setProperty("--at-15w", tint(c.accent, 15, true));
    root.setProperty("--at-30w", tint(c.accent, 30, true));
    root.setProperty("--at-40w", tint(c.accent, 40, true));
    root.setProperty("--at-10t", tint(c.accent, 10, false));
    root.setProperty("--at-12t", tint(c.accent, 12, false));
    root.setProperty("--at-15t", tint(c.accent, 15, false));
    root.setProperty("--at-40t", tint(c.accent, 40, false));
    // Update active swatch
    document.querySelectorAll(".color-swatch").forEach(s =>
      s.classList.toggle("active", s.dataset.color === name)
    );
  }

  function applyTheme(mode) {
    currentTheme = mode;
    localStorage.setItem("theme_mode", mode);
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const isDark = mode === "dark" || (mode === "system" && prefersDark);
    document.body.classList.toggle("light", !isDark);
    // Update active theme button
    document.querySelectorAll(".theme-opt").forEach(b =>
      b.classList.toggle("active", b.dataset.theme === mode)
    );
  }

  function openPopup(menuId, anchor) {
    const menu = document.getElementById(menuId);
    // Move to body if not already there (escapes any overflow:hidden parent)
    if (menu.parentElement !== document.body) document.body.appendChild(menu);
    const wasOpen = menu.classList.contains("open");
    // Close all
    document.querySelectorAll(".popup-menu").forEach(m => m.classList.remove("open"));
    if (wasOpen) return;
    menu.classList.add("open");
    // Position above the anchor button
    const r = anchor.getBoundingClientRect();
    const mw = 220;
    let left = r.left;
    if (left + mw > window.innerWidth - 8) left = window.innerWidth - mw - 8;
    if (left < 8) left = 8;
    menu.style.left = left + "px";
    menu.style.bottom = (window.innerHeight - r.top + 6) + "px";
    menu.style.top = "auto";
    menu.style.width = mw + "px";
  }

  function toggleUserMenu(e) {
    e.stopPropagation();
    openPopup("userMenu", e.currentTarget);
  }

  function toggleSettingsMenu(e) {
    e.stopPropagation();
    openPopup("settingsMenu", e.currentTarget);
  }

  function initAppearance() {
    applyAccentColor(currentColor);
    applyTheme(currentTheme);

    // Color swatch clicks
    document.querySelectorAll(".color-swatch").forEach(btn => {
      btn.addEventListener("click", e => { e.stopPropagation(); applyAccentColor(btn.dataset.color); });
    });

    // Theme button clicks
    document.querySelectorAll(".theme-opt").forEach(btn => {
      btn.addEventListener("click", e => { e.stopPropagation(); applyTheme(btn.dataset.theme); });
    });

    // System theme change listener
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      if (currentTheme === "system") applyTheme("system");
    });
  }

  /* ── Export / Import ── */
  function exportChat(id) {
    const chat = chats[id];
    if (!chat) return;
    const data = {
      _format: "aichat-v1",
      id: chat.id,
      name: chat.name,
      pinned: chat.pinned,
      exported: new Date().toISOString(),
      messages: chat.messages,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    // Sanitize name for filename
    const safe = chat.name.replace(/[^a-z0-9_\-\s]/gi, "").trim().replace(/\s+/g, "_") || "chat";
    a.download = safe + ".json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function triggerImport() {
    document.getElementById("importFileInput").value = "";
    document.getElementById("importFileInput").click();
  }

  function importChat(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if (!data._format || !data._format.startsWith("aichat")) {
          alert("This file doesn't look like a valid AI Chat export.");
          return;
        }
        // Give it a fresh ID to avoid collisions
        const newId = genId();
        chats[newId] = {
          id: newId,
          name: data.name || "Imported chat",
          pinned: data.pinned || false,
          messages: Array.isArray(data.messages) ? data.messages : [],
        };
        saveChats();
        renderSidebar();
        loadChat(newId);
      } catch(err) {
        alert("Failed to import: " + err.message);
      }
    };
    reader.readAsText(file);
  }

  function xhrPost(url, key, body) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open("POST", url, true);
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.setRequestHeader("Authorization", "Bearer " + key);
      xhr.withCredentials = false;
      xhr.timeout = 60000;
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        if (xhr.status >= 200 && xhr.status < 300) {
          try { resolve(JSON.parse(xhr.responseText)); }
          catch(e) { reject(new Error("Invalid JSON")); }
        } else {
          try { reject(new Error(JSON.parse(xhr.responseText)?.error?.message || "HTTP " + xhr.status)); }
          catch(e) { reject(new Error("HTTP " + xhr.status)); }
        }
      };
      xhr.onerror = () => reject(new Error("blocked"));
      xhr.ontimeout = () => reject(new Error("timeout"));
      xhr.send(body);
    });
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text || !activeChatId) return;

    input.value = "";
    input.style.height = "auto";
    document.getElementById("sendBtn").disabled = true;

    const chat = chats[activeChatId];

    if (chat.messages.length === 0) {
      chat.name = text.slice(0,42)+(text.length>42?"…":"");
      document.getElementById("chat-title").textContent = chat.name;
      renderSidebar();
    }

    chat.messages.push({ role:"user", content:text });
    saveChats();
    renderMessage("user", text);

    const thinkingEl = appendThinking();

    try {
      const payload = JSON.stringify({ model: MODEL, messages: chat.messages });

      // Try direct first, fall back to CORS proxy if blocked (VPN / iOS Safari)
      const data = await xhrPost("https://api.groq.com/openai/v1/chat/completions", apiKey, payload)
        .catch(() => xhrPost("https://corsproxy.io/?url=https://api.groq.com/openai/v1/chat/completions", apiKey, payload));
      thinkingEl.remove();
      const reply = data.error
        ? "Error: "+data.error.message
        : (data.choices?.[0]?.message?.content || "(no response)");
      if (!data.error) { chat.messages.push({role:"assistant",content:reply}); saveChats(); }
      renderMessage("assistant", reply);
    } catch(e) {
      thinkingEl.remove();
      renderMessage("assistant", "Network error: "+e.message);
    }

    document.getElementById("messages").scrollTop = 99999;
    document.getElementById("sendBtn").disabled = false;
    if (window.innerWidth > 640) document.getElementById("userInput").focus();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
    // Shift+Enter and arrow keys pass through naturally for multiline
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight,160)+"px";
  }

  // Dismiss keyboard when tapping outside textarea (important for iOS)
  document.addEventListener("touchstart", function(e) {
    const ta = document.getElementById("userInput");
    if (ta && !ta.contains(e.target) && document.activeElement === ta) {
      ta.blur();
    }
  }, { passive: true });

  // Also dismiss on click outside (desktop)
  document.addEventListener("mousedown", function(e) {
    const ta = document.getElementById("userInput");
    if (ta && !ta.contains(e.target) && document.activeElement === ta) {
      ta.blur();
    }
  });

  init();
</script>
</body>
</html>
