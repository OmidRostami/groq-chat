<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #setup {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .setup-card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .setup-card h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #f0f0f0;
    }

    .setup-card p {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .setup-card p a { color: #f97316; text-decoration: none; }

    label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 0.4rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.95rem;
      margin-bottom: 1.2rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #f97316; }

    .btn-primary {
      width: 100%;
      padding: 0.7rem;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: #ea6c0a; }

    .error-msg {
      font-size: 0.82rem;
      color: #f87171;
      margin-top: 0.8rem;
      display: none;
    }

    #chat {
      display: none;
      flex-direction: column;
      flex: 1;
      height: 100vh;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.2rem;
      border-bottom: 1px solid #1e1e1e;
      background: #141414;
    }

    .chat-header span {
      font-size: 0.95rem;
      font-weight: 500;
      color: #d4d4d4;
    }

    .header-buttons { display: flex; gap: 0.5rem; }

    .btn-small {
      font-size: 0.78rem;
      color: #666;
      background: none;
      border: 1px solid #2e2e2e;
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-small:hover { color: #f87171; border-color: #f87171; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .msg {
      display: flex;
      gap: 0.75rem;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .msg.user .avatar { background: #f97316; color: #fff; }
    .msg.assistant .avatar { background: #1e1e1e; color: #aaa; border: 1px solid #2e2e2e; }

    .bubble {
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.65;
      max-width: calc(100% - 44px);
      word-break: break-word;
    }

    .msg.user .bubble {
      background: #1c1008;
      border: 1px solid #7c2d12;
      color: #fed7aa;
      border-radius: 12px 4px 12px 12px;
      white-space: pre-wrap;
    }

    .msg.assistant .bubble {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      color: #e0e0e0;
      border-radius: 4px 12px 12px 12px;
    }

    /* Markdown styles inside assistant bubble */
    .bubble p { margin: 0 0 0.75rem; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 1rem 0 0.5rem; color: #f0f0f0; font-weight: 600; }
    .bubble h1 { font-size: 1.2rem; }
    .bubble h2 { font-size: 1.05rem; }
    .bubble h3 { font-size: 0.95rem; }
    .bubble ul, .bubble ol { padding-left: 1.4rem; margin: 0.5rem 0; }
    .bubble li { margin: 0.25rem 0; }
    .bubble strong { color: #f0f0f0; font-weight: 600; }
    .bubble em { color: #ccc; font-style: italic; }
    .bubble a { color: #f97316; text-decoration: none; }

    .bubble code {
      background: #111;
      color: #fb923c;
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.85em;
    }

    .bubble pre {
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      margin: 0.75rem 0;
      position: relative;
    }

    .bubble pre code {
      background: none;
      color: #e2e8f0;
      padding: 0;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: #2e2e2e;
      border: none;
      color: #aaa;
      font-size: 0.72rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .copy-btn:hover { background: #3e3e3e; color: #fff; }

    .bubble blockquote {
      border-left: 3px solid #f97316;
      padding-left: 1rem;
      color: #aaa;
      margin: 0.75rem 0;
    }

    .bubble hr {
      border: none;
      border-top: 1px solid #2e2e2e;
      margin: 1rem 0;
    }

    .thinking {
      display: flex;
      gap: 4px;
      padding: 0.6rem 0.2rem;
    }

    .thinking span {
      width: 6px;
      height: 6px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .input-bar {
      padding: 1rem;
      border-top: 1px solid #1e1e1e;
      background: #141414;
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 0.92rem;
      padding: 0.65rem 0.9rem;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    textarea:focus { border-color: #f97316; }

    .btn-send {
      width: 42px;
      height: 42px;
      background: #f97316;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .btn-send:hover { background: #ea6c0a; }
    .btn-send:disabled { background: #2e2e2e; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="setup">
  <div class="setup-card">
    <h1>AI Chat</h1>
    <p>
      Enter your <a href="https://console.groq.com/keys" target="_blank">Groq API key</a>.
      Free, fast, and saved only in your browser.
    </p>
    <label for="apiKey">Groq API Key</label>
    <input type="password" id="apiKey" placeholder="gsk_..." />
    <button class="btn-primary" onclick="saveSettings()">Save and start chatting</button>
    <p class="error-msg" id="setupError"></p>
  </div>
</div>

<div id="chat">
  <div class="chat-header">
    <span>AI Chat</span>
    <div class="header-buttons">
      <button class="btn-small" onclick="clearChat()">Clear chat</button>
      <button class="btn-small" onclick="signOut()">Sign out</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-bar">
    <textarea id="userInput" placeholder="Type a message…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()">&#9658;</button>
  </div>
</div>

<script>
  const STORAGE_KEY = "groq_api_key";
  const MODEL = "llama-3.3-70b-versatile";

  let history = [];
  let apiKey = "";

  marked.setOptions({ breaks: true, gfm: true });

  function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { apiKey = saved; showChat(); }
  }

  function saveSettings() {
    const key = document.getElementById("apiKey").value.trim();
    const err = document.getElementById("setupError");
    if (key.length < 10) {
      err.textContent = "Please enter a valid API key";
      err.style.display = "block";
      return;
    }
    localStorage.setItem(STORAGE_KEY, key);
    apiKey = key;
    err.style.display = "none";
    showChat();
  }

  function signOut() {
    localStorage.removeItem(STORAGE_KEY);
    apiKey = "";
    history = [];
    document.getElementById("messages").innerHTML = "";
    document.getElementById("chat").style.display = "none";
    document.getElementById("setup").style.display = "flex";
    document.getElementById("apiKey").value = "";
  }

  function clearChat() {
    history = [];
    document.getElementById("messages").innerHTML = "";
  }

  function showChat() {
    document.getElementById("setup").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    document.getElementById("userInput").focus();
  }

  function addCopyButtons(el) {
    el.querySelectorAll("pre").forEach(pre => {
      const btn = document.createElement("button");
      btn.className = "copy-btn";
      btn.textContent = "Copy";
      btn.onclick = () => {
        navigator.clipboard.writeText(pre.querySelector("code")?.innerText || pre.innerText);
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 1500);
      };
      pre.style.position = "relative";
      pre.appendChild(btn);
    });
  }

  function appendMessage(role, text, isThinking = false) {
    const msgs = document.getElementById("messages");
    const msg = document.createElement("div");
    msg.className = `msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "U" : "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (isThinking) {
      bubble.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
    } else if (role === "assistant") {
      bubble.innerHTML = marked.parse(text);
      addCopyButtons(bubble);
    } else {
      bubble.textContent = text;
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    msgs.appendChild(msg);
    msgs.scrollTop = msgs.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";
    document.getElementById("sendBtn").disabled = true;

    appendMessage("user", text);
    history.push({ role: "user", content: text });

    const thinkingBubble = appendMessage("assistant", "", true);

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`,
        },
        body: JSON.stringify({ model: MODEL, messages: history }),
      });

      const data = await res.json();

      if (data.error) {
        thinkingBubble.textContent = "Error: " + data.error.message;
      } else {
        const reply = data.choices?.[0]?.message?.content || "(no response)";
        thinkingBubble.innerHTML = marked.parse(reply);
        addCopyButtons(thinkingBubble);
        history.push({ role: "assistant", content: reply });
      }
    } catch (e) {
      thinkingBubble.textContent = "Network error: " + e.message;
    }

    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    document.getElementById("sendBtn").disabled = false;
    document.getElementById("userInput").focus();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }

  init();
</script>
</body>
</html>
