<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI Chat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      display: flex;
      height: 100dvh;
    }

    /* ════════════════════════════════════════
       HORIZONTAL sidebar (desktop / landscape)
       body has class "layout-h"
       ════════════════════════════════════════ */
    body.layout-h {
      flex-direction: row;
      height: 100dvh;
      overflow: hidden;
    }

    body.layout-h #sidebar {
      width: 248px;
      min-width: 248px;
      height: 100dvh;
      flex-shrink: 0;
      background: #111;
      border-right: 1px solid #1e1e1e;
      border-bottom: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.22s cubic-bezier(.4,0,.2,1), min-width 0.22s cubic-bezier(.4,0,.2,1);
    }

    body.layout-h #sidebar.sidebar-closed {
      width: 0;
      min-width: 0;
      border-right: none;
    }

    body.layout-h .sidebar-bottom { display: flex; flex-direction: column; }

    /* All icons hidden by default */
    .icon-h-open, .icon-h-closed, .icon-v-open, .icon-v-closed { display: none; }

    /* Horizontal layout icons — driven by body.sidebar-is-open */
    body.layout-h.sidebar-is-open  .icon-h-open   { display: block; }
    body.layout-h.sidebar-is-open  .icon-h-closed { display: none;  }
    body.layout-h:not(.sidebar-is-open) .icon-h-open   { display: none;  }
    body.layout-h:not(.sidebar-is-open) .icon-h-closed { display: block; }

    /* ════════════════════════════════════════
       VERTICAL sidebar (mobile / portrait)
       body has class "layout-v"
       ════════════════════════════════════════ */
    body.layout-v {
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    body.layout-v #sidebar {
      width: 100%;
      min-width: 0;
      height: 0;
      max-height: 0;
      flex-shrink: 0;
      background: #111;
      border-right: none;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: max-height 0.25s cubic-bezier(.4,0,.2,1);
    }

    body.layout-v #sidebar.sidebar-open {
      height: auto;
      max-height: 52dvh;
      overflow-y: auto;
    }

    /* Vertical layout icons — driven by body.sidebar-is-open */
    body.layout-v.sidebar-is-open  .icon-v-open   { display: block; }
    body.layout-v.sidebar-is-open  .icon-v-closed { display: none;  }
    body.layout-v:not(.sidebar-is-open) .icon-v-open   { display: none;  }
    body.layout-v:not(.sidebar-is-open) .icon-v-closed { display: block; }

    /* Bottom info row: show inline in vertical layout inside drawer */
    body.layout-v .sidebar-bottom {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.65rem;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    body.layout-v .user-row { margin-bottom: 0; flex-shrink: 0; }
    body.layout-v .user-name { display: none; }
    body.layout-v .key-row { flex: 1; margin-bottom: 0; }
    body.layout-v .btn-signout { width: auto; padding: 0.38rem 0.6rem; flex-shrink: 0; }

    /* Shared no-animation helper */
    #sidebar.no-transition { transition: none !important; }

    /* ── Main area shared ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Mobile content tweaks ── */
    @media (max-width: 640px) {
      .messages { padding: 0.75rem 0.5rem 0.25rem; }
      .msg { max-width: 100%; }
      .msg-body { max-width: calc(100% - 36px); }
      .bubble { font-size: 0.85rem; padding: 0.6rem 0.75rem; }
      .input-bar { padding: 0.4rem 0.5rem 0.6rem; }
      .input-wrap { padding-left: 0 !important; }
      .input-row { max-width: 100% !important; margin-left: 0 !important; border-radius: 12px; }
      textarea { min-height: 44px; font-size: 16px; }
      .code-block { font-size: 0.8rem; }
      .bubble pre code { font-size: 0.78rem; }
      .top-bar { padding: 0.45rem 0.75rem; }
    }

    .sidebar-top {
      padding: 0.65rem 0.65rem 0.5rem;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    .btn-new {
      width: 100%;
      padding: 0.55rem;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .btn-new:hover { background: #ea6c0a; }

    .btn-import {
      width: 100%;
      padding: 0.5rem;
      background: none;
      color: #888;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 400;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }
    .btn-import:hover { color: #f97316; border-color: #7c3a0a; }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0.4rem 0.5rem;
    }

    .section-label {
      font-size: 0.67rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      padding: 0.7rem 0.4rem 0.25rem;
      white-space: nowrap;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 0.48rem 0.5rem;
      border-radius: 7px;
      cursor: pointer;
      position: relative;
    }
    .chat-item:hover { background: #1c1c1c; }
    .chat-item.active { background: #251508; }

    .chat-pin-icon {
      display: flex;
      align-items: center;
      color: #f97316;
      margin-right: 0.35rem;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .chat-item-name {
      flex: 1;
      font-size: 0.82rem;
      color: #bbb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .chat-item.active .chat-item-name { color: #f97316; }

    .chat-item-actions {
      display: flex;
      gap: 0.15rem;
      flex-shrink: 0;
      opacity: 0;
      pointer-events: none;
    }
    .chat-item:hover .chat-item-actions { opacity: 1; pointer-events: auto; }

    .icon-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.18rem 0.26rem;
      border-radius: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover { color: #ddd; background: #2a2a2a; }
    .icon-btn.del:hover { color: #f87171; background: #1f0e0e; }
    .icon-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .icon-btn.del svg { width: 13px; height: 13px; }

    /* Sidebar bottom */
    .sidebar-bottom {
      border-top: 1px solid #1a1a1a;
      padding: 0.65rem;
      flex-shrink: 0;
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 0.5rem;
    }

    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #f97316;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 0.83rem;
      color: #ccc;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .key-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .key-label {
      font-size: 0.72rem;
      color: #444;
    }

    .key-copy-btn {
      background: none;
      border: 1px solid #222;
      color: #555;
      cursor: pointer;
      padding: 0.18rem 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-shrink: 0;
      border-radius: 5px;
      font-size: 0.7rem;
    }
    .key-copy-btn:hover { color: #f97316; border-color: #7c3a0a; }
    .key-copy-btn svg { width: 11px; height: 11px; }

    .btn-signout {
      width: 100%;
      padding: 0.42rem;
      background: none;
      color: #555;
      border: 1px solid #222;
      border-radius: 7px;
      font-size: 0.78rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      white-space: nowrap;
    }
    .btn-signout:hover { color: #f87171; border-color: #4a1515; background: #1a0a0a; }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 1rem;
      border-bottom: 1px solid #1a1a1a;
      background: #111;
      flex-shrink: 0;
    }

    .btn-toggle {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-toggle:hover { color: #ddd; background: #1e1e1e; }
    .btn-toggle svg { width: 18px; height: 18px; }

    #chat-title {
      flex: 1;
      font-size: 0.87rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    /* ── Setup ── */
    #setup {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .setup-card {
      background: #161616;
      border: 1px solid #242424;
      border-radius: 16px;
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .setup-card h1 { font-size: 1.35rem; font-weight: 600; margin-bottom: 0.3rem; color: #f0f0f0; }
    .setup-card > p { font-size: 0.83rem; color: #777; margin-bottom: 1.75rem; line-height: 1.5; }
    .setup-card a { color: #f97316; text-decoration: none; }

    .field-group { margin-bottom: 1.1rem; }
    .field-group label { display: block; font-size: 0.78rem; color: #888; margin-bottom: 0.35rem; }

    .field-group input {
      width: 100%;
      padding: 0.62rem 0.85rem;
      background: #0d0d0d;
      border: 1px solid #242424;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .field-group input:focus { border-color: #f97316; }

    .btn-primary {
      width: 100%;
      padding: 0.68rem;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.4rem;
    }
    .btn-primary:hover { background: #ea6c0a; }
    .error-msg { font-size: 0.8rem; color: #f87171; margin-top: 0.7rem; display: none; }

    /* ── Chat view ── */
    #chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: #0f0f0f;
    }

    .msg {
      display: flex;
      gap: 0.6rem;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
    }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      font-weight: 700;
      margin-top: 2px;
    }
    .msg.user .avatar { background: #f97316; color: #fff; }
    .msg.assistant .avatar { background: #1c1c1c; color: #888; border: 1px solid #2a2a2a; }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 0.28rem;
      min-width: 0;
      max-width: calc(100% - 38px);
    }
    .msg.user .msg-body { align-items: flex-end; }

    .bubble {
      padding: 0.68rem 0.88rem;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.68;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #1c1008;
      border: 1px solid #7c2d12;
      color: #fed7aa;
      border-radius: 12px 4px 12px 12px;
      white-space: pre-wrap;
    }
    .msg.assistant .bubble {
      background: #161616;
      border: 1px solid #242424;
      color: #ddd;
      border-radius: 4px 12px 12px 12px;
    }

    .msg-actions { display: flex; gap: 0.3rem; margin-top: 0.4rem; }

    .msg-action-btn {
      font-size: 0.68rem;
      color: #444;
      background: none;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 0.16rem 0.42rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .msg-action-btn:hover { color: #f97316; border-color: #7c3a0a; }

    /* Markdown */
    .bubble p { margin: 0 0 0.65rem; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1,.bubble h2,.bubble h3 { margin: 0.85rem 0 0.4rem; color: #f0f0f0; font-weight: 600; }
    .bubble h1 { font-size: 1.08rem; }
    .bubble h2 { font-size: 0.96rem; }
    .bubble h3 { font-size: 0.88rem; }
    .bubble ul,.bubble ol { padding-left: 1.25rem; margin: 0.4rem 0; }
    .bubble li { margin: 0.2rem 0; }
    .bubble strong { color: #f0f0f0; font-weight: 600; }
    .bubble em { color: #bbb; }
    .bubble a { color: #f97316; text-decoration: underline; text-underline-offset: 3px; }
    .bubble blockquote { border-left: 3px solid #f97316; padding-left: 0.85rem; color: #888; margin: 0.65rem 0; }
    .bubble hr { border: none; border-top: 1px solid #222; margin: 0.85rem 0; }

    .bubble code {
      background: #0d0d0d;
      color: #fb923c;
      padding: 0.1em 0.35em;
      border-radius: 4px;
      font-family: 'Fira Code', monospace;
      font-size: 0.81em;
    }
    .code-block {
      position: relative;
      margin: 0.65rem 0;
      border: 1px solid #222;
      border-radius: 8px;
      background: #0d0d0d;
    }
    .code-block-header {
      display: flex;
      justify-content: flex-end;
      padding: 0.4rem 0.4rem 0;
    }
    .bubble pre {
      background: transparent;
      border: none;
      border-radius: 0 0 8px 8px;
      padding: 0.5rem 0.85rem 0.85rem;
      overflow-x: auto;
      margin: 0;
    }
    .bubble pre code { background: none; color: #e2e8f0; padding: 0; font-size: 0.81rem; line-height: 1.6; }

    .copy-btn {
      background: #1e1e1e;
      border: none;
      color: #888;
      font-size: 0.67rem;
      padding: 0.16rem 0.42rem;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .copy-btn:hover { background: #2a2a2a; color: #fff; }

    .thinking { display: flex; gap: 4px; padding: 0.45rem 0.2rem; }
    .thinking span { width: 5px; height: 5px; background: #444; border-radius: 50%; animation: bounce 1.2s infinite; }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

    .input-bar {
      flex-shrink: 0;
      padding: 0.75rem 1rem 1rem;
      background: transparent;
      display: flex;
      align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      justify-content: center;
      padding-left: 38px;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 0.55rem;
      width: 100%;
      max-width: 742px;
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      border-radius: 16px;
      padding: 0.55rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.45);
    }

    textarea {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      color: #f0f0f0;
      font-size: 0.88rem;
      padding: 0.4rem 0.5rem;
      resize: none;
      min-height: 52px;
      max-height: 240px;
      line-height: 1.6;
      outline: none;
      font-family: inherit;
      overflow-y: auto;
      scrollbar-width: none;
    }
    textarea::-webkit-scrollbar { display: none; }
    textarea:focus { outline: none; }
    .input-row:focus-within { border-color: #f97316; }

    .btn-send {
      width: 36px;
      height: 36px;
      background: #f97316;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .btn-send:hover { background: #ea6c0a; }
    .btn-send:disabled { background: #2a2a2a; cursor: not-allowed; }
    .btn-send svg { width: 15px; height: 15px; }

    /* ── Custom delete modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(2px);
    }
    .modal-box {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 1.75rem 1.75rem 1.5rem;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .modal-icon {
      width: 40px;
      height: 40px;
      background: #1f0e0e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.25rem;
    }
    .modal-icon svg { width: 20px; height: 20px; min-width: 20px; min-height: 20px; color: #f87171; }
    .modal-title { font-size: 1rem; font-weight: 600; color: #f0f0f0; }
    .modal-desc { font-size: 0.83rem; color: #777; line-height: 1.5; }
    .modal-actions { display: flex; gap: 0.6rem; margin-top: 0.5rem; }
    .modal-btn {
      flex: 1;
      padding: 0.6rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }
    .modal-btn.cancel { background: #1e1e1e; color: #aaa; border: 1px solid #2a2a2a; }
    .modal-btn.cancel:hover { background: #252525; color: #ddd; }
    .modal-btn.confirm { background: #b91c1c; color: #fff; }
    .modal-btn.confirm:hover { background: #991b1b; }

    .rename-input {
      background: #0d0d0d;
      border: 1px solid #f97316;
      border-radius: 4px;
      color: #f0f0f0;
      font-size: 0.82rem;
      padding: 0.1rem 0.3rem;
      outline: none;
      flex: 1;
      min-width: 0;
      width: 100%;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
  </style>
</head>
<body>

<script>
  // Pre-paint: set layout + sidebar state before first render to avoid flash
  (function() {
    var isH = window.innerWidth > window.innerHeight && window.innerWidth > 640;
    document.body.classList.add(isH ? "layout-h" : "layout-v");
    var open = localStorage.getItem("sidebar_open") !== "0";
    document.body.classList.toggle("sidebar-is-open", open);
    var sidebar = document.getElementById("sidebar");
    if (sidebar) {
      sidebar.classList.add("no-transition");
      if (isH && !open) sidebar.classList.add("sidebar-closed");
      // vertical: default is closed (height:0), only add sidebar-open if open
      if (!isH && open) sidebar.classList.add("sidebar-open");
    }
  })();
</script>

<!-- Delete modal -->
<div class="modal-overlay" id="deleteModal" style="display:none;">
  <div class="modal-box">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    </div>
    <div class="modal-title">Delete chat</div>
    <div class="modal-desc" id="deleteModalDesc">This chat will be permanently deleted and cannot be recovered.</div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-top">
    <button class="btn-new" onclick="newChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

<!-- Main -->
<div id="main">

  <!-- Setup -->
  <div id="setup">
    <div class="setup-card">
      <h1>AI Chat</h1>

  <!-- Chat -->

          <line x1="13" y1="9" x2="10" y2="12"/><line x1="10" y1="12" x2="13" y2="15"/>

        <!-- Horizontal: sidebar closed → arrow points right (open) -->
        <svg class="icon-h-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
          <line x1="14" y1="9" x2="17" y2="12"/><line x1="17" y1="12" x2="14" y2="15"/>
        </svg>
        <!-- Vertical: sidebar open → arrow points up (close) -->
        <svg class="icon-v-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="13" x2="12" y2="10"/><line x1="12" y1="10" x2="15" y2="13"/>
        </svg>
        <!-- Vertical: sidebar closed → arrow points down (open) -->
        <svg class="icon-v-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>

            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="btn-send" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>

</div>

<script>
  const KEY_STORE   = "groq_api_key";
  const NAME_STORE  = "groq_user_name";
  const CHATS_STORE = "groq_chats";
  const MODEL = "llama-3.3-70b-versatile";

  let apiKey = "";
  let userName = "";
  let chats = {};
  let activeChatId = null;
  let sidebarOpen = true;
  let pendingDeleteId = null;

  marked.setOptions({ breaks: true, gfm: true });

  // Override link renderer to open in new tab
  const renderer = new marked.Renderer();
  renderer.link = function(href, title, text) {
    const t = title ? ` title="${title}"` : '';
    return `<a href="${href}"${t} target="_blank" rel="noopener noreferrer">${text}</a>`;
  };
  marked.setOptions({ renderer });

  /* ── Init ── */
  function init() {
    apiKey   = localStorage.getItem(KEY_STORE) || "";
    userName = localStorage.getItem(NAME_STORE) || "";
    chats    = JSON.parse(localStorage.getItem(CHATS_STORE) || "{}");
    // Restore sidebar state (var + icons must match the CSS class already applied)
    const savedSidebar = localStorage.getItem("sidebar_open");
    sidebarOpen = savedSidebar !== "0";
    applyLayout(); // sets layout class + sidebar state without animation
    if (apiKey && userName) showApp();
  }

  // "horizontal" = side panel (desktop/landscape), "vertical" = top drawer (portrait/mobile)
  function getLayout() {
    return window.innerWidth > window.innerHeight && window.innerWidth > 640
      ? "horizontal" : "vertical";
  }

  function applyLayout() {
    const layout = getLayout();
    document.body.classList.toggle("layout-h", layout === "horizontal");
    document.body.classList.toggle("layout-v", layout === "vertical");
    applySidebarState(false);
  }

  function applySidebarState(animate) {
    const sidebar = document.getElementById("sidebar");
    if (!sidebar) return;
    if (!animate) sidebar.classList.add("no-transition");

    const layout = getLayout();

    // Clean up both classes first
    sidebar.classList.remove("sidebar-open", "sidebar-closed");
    document.body.classList.toggle("sidebar-is-open", sidebarOpen);

    if (layout === "horizontal") {
      if (!sidebarOpen) sidebar.classList.add("sidebar-closed");
    } else {
      if (sidebarOpen) sidebar.classList.add("sidebar-open");
    }

    if (!animate) {
      requestAnimationFrame(() => requestAnimationFrame(() =>
        sidebar.classList.remove("no-transition")
      ));
    }
  }

  // Re-apply layout on orientation change
  window.addEventListener("resize", () => applyLayout());

  function saveChats() { localStorage.setItem(CHATS_STORE, JSON.stringify(chats)); }

  /* ── Setup ── */
  function saveSettings() {
    const name = document.getElementById("inputName").value.trim();
    const key  = document.getElementById("apiKey").value.trim();
    const err  = document.getElementById("setupError");
    if (!name) { err.textContent = "Please enter your name"; err.style.display = "block"; return; }
    if (key.length < 10) { err.textContent = "Please enter a valid API key"; err.style.display = "block"; return; }
    localStorage.setItem(NAME_STORE, name);
    localStorage.setItem(KEY_STORE, key);
    apiKey = key; userName = name;
    err.style.display = "none";
    showApp();
  }

  function signOut() {
    localStorage.removeItem(KEY_STORE);
    localStorage.removeItem(NAME_STORE);
    localStorage.removeItem(CHATS_STORE);
    apiKey = ""; userName = ""; chats = {}; activeChatId = null;
    document.getElementById("setup").style.display = "flex";
    document.getElementById("chat-view").style.display = "none";
    document.getElementById("chat-list").innerHTML = "";
    document.getElementById("apiKey").value = "";
    document.getElementById("inputName").value = "";
  }

  function showApp() {
    document.getElementById("setup").style.display = "none";
    document.getElementById("chat-view").style.display = "flex";
    // Show user in sidebar
    const initials = userName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    document.getElementById("userAvatarSidebar").textContent = initials;
    document.getElementById("userNameSidebar").textContent = userName;
    // Copy API key button
    document.getElementById("keyCopyBtn").onclick = () => {
      navigator.clipboard.writeText(apiKey);
      const btn = document.getElementById("keyCopyBtn");
      btn.style.color = "#f97316";
      setTimeout(() => btn.style.color = "", 1200);
    };
    renderSidebar();
    const ids = Object.keys(chats);
    if (ids.length) loadChat(ids[ids.length-1]);
    else newChat();
  }

  /* ── Sidebar toggle ── */
  function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    localStorage.setItem("sidebar_open", sidebarOpen ? "1" : "0");
    applySidebarState(true);
  }

  /* ── Chat CRUD ── */
  function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

  function newChat() {
    const id = genId();
    chats[id] = { id, name:"New chat", pinned:false, messages:[] };
    saveChats();
    activeChatId = id;
    renderSidebar();
    loadChat(id);
    if (window.innerWidth > 640) document.getElementById("userInput").focus();
  }

  function loadChat(id) {
    activeChatId = id;
    const chat = chats[id];
    document.getElementById("chat-title").textContent = chat.name;
    const msgs = document.getElementById("messages");
    msgs.innerHTML = "";
    chat.messages.forEach(m => renderMessage(m.role, m.content));
    msgs.scrollTop = msgs.scrollHeight;
    renderSidebar();
    if (window.innerWidth > 640) document.getElementById("userInput").focus();
  }

  function togglePin(id) {
    chats[id].pinned = !chats[id].pinned;
    saveChats();
    renderSidebar();
  }

  /* ── Delete modal ── */
  function askDelete(id) {
    pendingDeleteId = id;
    document.getElementById("deleteModalDesc").textContent =
      `"${chats[id].name}" will be permanently deleted and cannot be recovered.`;
    document.getElementById("deleteModal").style.display = "flex";
  }

  function closeDeleteModal() {
    pendingDeleteId = null;
    document.getElementById("deleteModal").style.display = "none";
  }

  function confirmDelete() {
    const id = pendingDeleteId;
    closeDeleteModal();
    if (!id || !chats[id]) return;
    delete chats[id];
    saveChats();
    if (activeChatId === id) activeChatId = null;
    renderSidebar();
    const ids = Object.keys(chats);
    if (ids.length) loadChat(ids[ids.length-1]);
    else newChat();
  }

  document.getElementById("deleteModal").addEventListener("click", e => {
    if (e.target === document.getElementById("deleteModal")) closeDeleteModal();
  });

  function startRename(id, nameEl) {
    const chat = chats[id];
    const input = document.createElement("input");
    input.className = "rename-input";
    input.value = chat.name;
    nameEl.replaceWith(input);
    input.focus(); input.select();
    const finish = () => {
      const val = input.value.trim() || "New chat";
      chat.name = val; saveChats();
      if (activeChatId === id) document.getElementById("chat-title").textContent = val;
      renderSidebar();
    };
    input.addEventListener("blur", finish);
    input.addEventListener("keydown", e => {
      if (e.key==="Enter") { e.preventDefault(); input.blur(); }
      if (e.key==="Escape") { input.value=chat.name; input.blur(); }
    });
  }

  /* ── Sidebar render ── */
  function renderSidebar() {
    const list = document.getElementById("chat-list");
    list.innerHTML = "";

    const all = Object.values(chats);
    const pinned = all.filter(c=>c.pinned).reverse();
    const recent = all.filter(c=>!c.pinned).reverse();

    function makeItem(chat) {
      const id = chat.id;
      const item = document.createElement("div");
      item.className = "chat-item" + (id===activeChatId?" active":"");

      if (chat.pinned) {
        const pin = document.createElement("div");
        pin.className = "chat-pin-icon";
        pin.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:10px;height:10px"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>`;
        item.appendChild(pin);
      }

      const nameEl = document.createElement("div");
      nameEl.className = "chat-item-name";
      nameEl.textContent = chat.name;
      nameEl.onclick = () => loadChat(id);

      const actions = document.createElement("div");
      actions.className = "chat-item-actions";

      // Pin button
      const pinBtn = document.createElement("button");
      pinBtn.className = "icon-btn";
      pinBtn.title = chat.pinned ? "Unpin" : "Pin";
      pinBtn.innerHTML = chat.pinned
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L8 8H2l5 5-2 9 7-4 7 4-2-9 5-5h-6z"/></svg>`;
      pinBtn.onclick = e => { e.stopPropagation(); togglePin(id); };

      // Rename button
      const renameBtn = document.createElement("button");
      renameBtn.className = "icon-btn";
      renameBtn.title = "Rename";
      renameBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
      renameBtn.onclick = e => { e.stopPropagation(); startRename(id, nameEl); };

      // Export button
      const expBtn = document.createElement("button");
      expBtn.className = "icon-btn";
      expBtn.title = "Export chat";
      expBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
      expBtn.onclick = e => { e.stopPropagation(); exportChat(id); };

      // Delete button
      const delBtn = document.createElement("button");
      delBtn.className = "icon-btn del";
      delBtn.title = "Delete";
      delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
      delBtn.onclick = e => { e.stopPropagation(); askDelete(id); };

      actions.appendChild(pinBtn);
      actions.appendChild(renameBtn);
      actions.appendChild(expBtn);
      actions.appendChild(delBtn);
      item.appendChild(nameEl);
      item.appendChild(actions);
      return item;
    }

    if (pinned.length) {
      const lbl = document.createElement("div");
      lbl.className = "section-label";
      lbl.textContent = "Pinned";
      list.appendChild(lbl);
      pinned.forEach(c => list.appendChild(makeItem(c)));
    }

    if (recent.length) {
      const lbl = document.createElement("div");
      lbl.className = "section-label";
      lbl.textContent = pinned.length ? "Recent" : "Chats";
      list.appendChild(lbl);
      recent.forEach(c => list.appendChild(makeItem(c)));
    }

    if (!pinned.length && !recent.length) {
      list.innerHTML = '<div style="padding:1rem 0.5rem;color:#333;font-size:0.8rem;">No chats yet</div>';
    }
  }

  /* ── Messages ── */
  function addCopyButtons(el) {
    el.querySelectorAll("pre").forEach(pre => {
      const wrapper = document.createElement("div");
      wrapper.className = "code-block";

      const header = document.createElement("div");
      header.className = "code-block-header";

      const btn = document.createElement("button");
      btn.className = "copy-btn";
      btn.textContent = "Copy";
      btn.onclick = () => {
        navigator.clipboard.writeText(pre.querySelector("code")?.innerText || pre.innerText);
        btn.textContent = "Copied!";
        setTimeout(()=>btn.textContent="Copy", 1500);
      };

      header.appendChild(btn);
      wrapper.appendChild(header);
      pre.replaceWith(wrapper);
      wrapper.appendChild(pre);
    });
  }

  function toPlainText(md) {
    return md
      .replace(/```[\s\S]*?```/g, m=>m.replace(/```\w*\n?/g,"").trim())
      .replace(/`([^`]+)`/g,"$1")
      .replace(/\*\*(.+?)\*\*/g,"$1")
      .replace(/\*(.+?)\*/g,"$1")
      .replace(/^#{1,6}\s+/gm,"")
      .replace(/^>\s+/gm,"")
      .replace(/^\s*[-*+]\s+/gm,"• ")
      .replace(/\[(.+?)\]\(.+?\)/g,"$1")
      .trim();
  }

  function renderMessage(role, content) {
    const msgs = document.getElementById("messages");
    const msg = document.createElement("div");
    msg.className = `msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    if (role === "user") {
      const initials = userName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
      avatar.textContent = initials || "U";
    } else {
      avatar.textContent = "AI";
    }

    const body = document.createElement("div");
    body.className = "msg-body";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (role === "assistant") {
      bubble.innerHTML = marked.parse(content);
      addCopyButtons(bubble);
    } else {
      bubble.textContent = content;
    }

    const actions = document.createElement("div");
    actions.className = "msg-actions";

    const copyBtn = document.createElement("button");
    copyBtn.className = "msg-action-btn";
    copyBtn.textContent = "Copy";
    copyBtn.onclick = () => {
      const plain = role==="assistant" ? toPlainText(content) : content;
      navigator.clipboard.writeText(plain);
      copyBtn.textContent = "Copied!";
      setTimeout(()=>copyBtn.textContent="Copy", 1500);
    };

    actions.appendChild(copyBtn);
    body.appendChild(bubble);
    body.appendChild(actions);
    msg.appendChild(avatar);
    msg.appendChild(body);
    msgs.appendChild(msg);
    return bubble;
  }

  function appendThinking() {
    const msgs = document.getElementById("messages");
    const msg = document.createElement("div");
    msg.className = "msg assistant";
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "AI";
    const body = document.createElement("div");
    body.className = "msg-body";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
    body.appendChild(bubble);
    msg.appendChild(avatar);
    msg.appendChild(body);
    msgs.appendChild(msg);
    msgs.scrollTop = msgs.scrollHeight;
    return msg;
  }

  /* ── Send ── */
  /* ── Export / Import ── */
  function exportChat(id) {
    const chat = chats[id];
    if (!chat) return;
    const data = {
      _format: "aichat-v1",
      id: chat.id,
      name: chat.name,
      pinned: chat.pinned,
      exported: new Date().toISOString(),
      messages: chat.messages,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    // Sanitize name for filename
    const safe = chat.name.replace(/[^a-z0-9_\-\s]/gi, "").trim().replace(/\s+/g, "_") || "chat";
    a.download = safe + ".aichat";
    a.click();
    URL.revokeObjectURL(url);
  }

  function triggerImport() {
    document.getElementById("importFileInput").value = "";
    document.getElementById("importFileInput").click();
  }

  function importChat(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if (!data._format || !data._format.startsWith("aichat")) {
          alert("This file doesn't look like a valid AI Chat export.");
          return;
        }
        // Give it a fresh ID to avoid collisions
        const newId = genId();
        chats[newId] = {
          id: newId,
          name: data.name || "Imported chat",
          pinned: data.pinned || false,
          messages: Array.isArray(data.messages) ? data.messages : [],
        };
        saveChats();
        renderSidebar();
        loadChat(newId);
      } catch(err) {
        alert("Failed to import: " + err.message);
      }
    };
    reader.readAsText(file);
  }

  function xhrPost(url, key, body) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open("POST", url, true);
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.setRequestHeader("Authorization", "Bearer " + key);
      xhr.withCredentials = false;
      xhr.timeout = 60000;
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        if (xhr.status >= 200 && xhr.status < 300) {
          try { resolve(JSON.parse(xhr.responseText)); }
          catch(e) { reject(new Error("Invalid JSON")); }
        } else {
          try { reject(new Error(JSON.parse(xhr.responseText)?.error?.message || "HTTP " + xhr.status)); }
          catch(e) { reject(new Error("HTTP " + xhr.status)); }
        }
      };
      xhr.onerror = () => reject(new Error("blocked"));
      xhr.ontimeout = () => reject(new Error("timeout"));
      xhr.send(body);
    });
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text || !activeChatId) return;

    input.value = "";
    input.style.height = "auto";
    document.getElementById("sendBtn").disabled = true;

    const chat = chats[activeChatId];

    if (chat.messages.length === 0) {
      chat.name = text.slice(0,42)+(text.length>42?"…":"");
      document.getElementById("chat-title").textContent = chat.name;
      renderSidebar();
    }

    chat.messages.push({ role:"user", content:text });
    saveChats();
    renderMessage("user", text);

    const thinkingEl = appendThinking();

    try {
      const payload = JSON.stringify({ model: MODEL, messages: chat.messages });

      // Try direct first, fall back to CORS proxy if blocked (VPN / iOS Safari)
      const data = await xhrPost("https://api.groq.com/openai/v1/chat/completions", apiKey, payload)
        .catch(() => xhrPost("https://corsproxy.io/?url=https://api.groq.com/openai/v1/chat/completions", apiKey, payload));
      thinkingEl.remove();
      const reply = data.error
        ? "Error: "+data.error.message
        : (data.choices?.[0]?.message?.content || "(no response)");
      if (!data.error) { chat.messages.push({role:"assistant",content:reply}); saveChats(); }
      renderMessage("assistant", reply);
    } catch(e) {
      thinkingEl.remove();
      renderMessage("assistant", "Network error: "+e.message);
    }

    document.getElementById("messages").scrollTop = 99999;
    document.getElementById("sendBtn").disabled = false;
    if (window.innerWidth > 640) document.getElementById("userInput").focus();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
    // Shift+Enter and arrow keys pass through naturally for multiline
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight,160)+"px";
  }

  // Dismiss keyboard when tapping outside textarea (important for iOS)
  document.addEventListener("touchstart", function(e) {
    const ta = document.getElementById("userInput");
    if (ta && !ta.contains(e.target) && document.activeElement === ta) {
      ta.blur();
    }
  }, { passive: true });

  // Also dismiss on click outside (desktop)
  document.addEventListener("mousedown", function(e) {
    const ta = document.getElementById("userInput");
    if (ta && !ta.contains(e.target) && document.activeElement === ta) {
      ta.blur();
    }
  });

  init();
</script>
</body>
</html>
